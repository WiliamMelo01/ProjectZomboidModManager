<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zomboid Server Mod Manager</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>Zomboid Server Mod Manager</h1>
      </header>
      <main>
        <section class="sidebar">
          <input id="search" placeholder="Search mods..." />
          <div id="mod-list">Loading mods...</div>
        </section>
        <section class="content">
          <div id="details">Select a mod to see details.</div>
        </section>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
